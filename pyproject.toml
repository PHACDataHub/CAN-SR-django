[tool.black]
line-length = 79
target-version = ['py310']
include = '\.pyi?$'
exclude = '''

(
  /(
      \.eggs         # exclude a few common directories in the
    | \.git          # root of the project
    | \.mypy_cache
    | venv
  )/
  # ignore auto-generated migrations, no one ever saves those manually
  | migrations/.*.py 
  | migrations/.*_initial.py 
  | migrations/.*_auto_.*.py 
)
'''


[tool.isort]
profile = "black"
line_length = 79
known_django = "django"
known_proj = "proj"
sections=[ "FUTURE", "STDLIB", "DJANGO", "THIRDPARTY", "PROJ", "FIRSTPARTY", "LOCALFOLDER" ]
skip_glob=['*/migrations/*.py']





[tool.pylint]
disable = [
  "missing-module-docstring",
  "missing-class-docstring",
  "missing-function-docstring",
  "unused-argument",
  "too-few-public-methods",
  "method-could-be-a-function",
  "fixme",
  
  # htpy:
  "invalid-name", # htpy convention is PascalCase for functions
  "no-value-for-parameter", # children arg is passed via weird decorator magic

  # these fails because pylint runs from root dir, not src/
    "import-error", 
    "relative-beyond-top-level"
]


[tool.pylint.TYPECHECK]
generated-members = [
  "objects",
  "_meta",
  "DoesNotExist",
  "MultipleObjectsReturned",
]
