name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  pytest-sqlite:
    name: Pytest (sqlite)
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: "*"
      INTERNAL_IPS: 127.0.0.1
      IS_LOCAL_DEV: "1"
      GROBID_URL: dev
      USE_SQLITE: "1"
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ../requirements.txt -r ../requirements_dev.txt

      - name: Run tests
        run: pytest tests/

  pytest-postgres:
    name: Pytest (postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hail_django_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "0"
      ALLOWED_HOSTS: "*"
      INTERNAL_IPS: 127.0.0.1
      IS_LOCAL_DEV: "1"
      GROBID_URL: dev
      USE_SQLITE: "0"
      DB_NAME: hail_django_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      TEST_DB_NAME: hail_django_db_test
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ../requirements.txt -r ../requirements_dev.txt

      - name: Run tests with coverage
        run: |
          coverage run --source=. -m pytest tests/
          coverage xml

      - name: Upload coverage reports to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: PHACDataHub/CAN-SR-django
          files: src/coverage.xml

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_formatting.txt

      - name: Install formatting tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_formatting.txt

      - name: Check isort
        run: isort src --settings-path pyproject.toml --check-only --diff

      - name: Check black
        run: black src --config pyproject.toml --check
