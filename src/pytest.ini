[pytest]
DJANGO_SETTINGS_MODULE= proj.settings
addopts = -p no:warnings  -v -s
asyncio_mode = auto
markers =
    view: tests that use the Django test client to make requests and assert responses
    backend: tests that do not use the Django test client as the subject under test
    l1_screening: tests covering level 1 screening behavior
    l2_screening: tests covering level 2 screening behavior
